services:
  app:
    image: umkmcepat-app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umkmcepat-app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      9router:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-umkmcepat}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NINE_ROUTER_BASE_URL: ${NINE_ROUTER_BASE_URL:-http://9router:20128/v1}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-local}
      LOCAL_UPLOAD_DIR: ${LOCAL_UPLOAD_DIR:-/app/.data/uploads}
      GENERATED_BUILD_EXECUTION_ENABLED: "false"
      GENERATED_PUBLIC_EXECUTION_ENABLED: "false"
      GENERATED_PUBLIC_ORIGIN: ${GENERATED_PUBLIC_ORIGIN:-}
      PROJECT_ARTIFACT_STORAGE_PROVIDER: local
      PROJECT_ARTIFACT_DIR: /app/.data/project-artifacts
      PROJECT_THUMBNAIL_DIR: /app/.data/project-thumbnails
      PROJECT_THUMBNAIL_CAPTURE_ENABLED: "true"
      PROJECT_THUMBNAIL_BROWSER_PATH: /usr/bin/chromium-browser
      PROJECT_THUMBNAIL_CONCURRENCY: ${PROJECT_THUMBNAIL_CONCURRENCY:-1}
      PROJECT_THUMBNAIL_TIMEOUT_MS: ${PROJECT_THUMBNAIL_TIMEOUT_MS:-15000}
      PROJECT_ARTIFACT_R2_PREFIX: ${PROJECT_ARTIFACT_R2_PREFIX:-project-artifacts}
      PROJECT_RUNTIME_SUPERVISOR: noop
      PROJECT_RUNTIME_ALLOWED_HOSTS: ${PROJECT_RUNTIME_ALLOWED_HOSTS:-127.0.0.1,localhost}
      PROJECT_RUNTIME_HEALTH_TIMEOUT_MS: ${PROJECT_RUNTIME_HEALTH_TIMEOUT_MS:-2000}
      PROJECT_RUNTIME_PROXY_TIMEOUT_MS: ${PROJECT_RUNTIME_PROXY_TIMEOUT_MS:-15000}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r=await fetch('http://127.0.0.1:3000/api/health/ready');process.exit(r.ok?0:1)",
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 4
    volumes:
      - uploads:/app/.data/uploads
      - project_artifacts:/app/.data/project-artifacts
      - project_thumbnails:/app/.data/project-thumbnails

  migrate:
    image: umkmcepat-app:local
    container_name: umkmcepat-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-umkmcepat}?schema=public
    command: ["bunx", "prisma", "migrate", "deploy"]

  9router:
    image: decolua/9router:latest
    container_name: umkmcepat-9router
    restart: unless-stopped
    depends_on:
      - headroom
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_BASE_URL: ${NINE_ROUTER_PUBLIC_URL:-http://localhost:20129}
    ports:
      - "127.0.0.1:20129:20128"
    volumes:
      - nine_router_data:/app/data

  headroom:
    build:
      context: .
      dockerfile: Dockerfile.headroom
    container_name: umkmcepat-headroom
    restart: unless-stopped
    environment:
      HEADROOM_TELEMETRY: off

  postgres:
    image: postgres:16-alpine
    container_name: umkmcepat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-umkmcepat}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-umkmcepat}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nine_router_data:
  project_artifacts:
  project_thumbnails:
  uploads:
