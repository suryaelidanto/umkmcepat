services:
  postgres:
    image: postgres:16-alpine
    container_name: umkmcepat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: umkmcepat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d umkmcepat"]
      interval: 10s
      timeout: 5s
      retries: 5

  9router:
    image: decolua/9router:latest
    container_name: umkmcepat-9router
    restart: unless-stopped
    profiles:
      - ai
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_BASE_URL: http://localhost:20129
    ports:
      - "20130:20128"
    volumes:
      - nine_router_data:/app/data

  redis:
    image: redis:7-alpine
    container_name: umkmcepat-redis
    restart: unless-stopped
    profiles:
      - redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  nine_router_data:
  redis_data:
