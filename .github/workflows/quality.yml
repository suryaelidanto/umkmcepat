name: Quality

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: umkmcepat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d umkmcepat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/umkmcepat?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-characters
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      AI_PROVIDER: 9router
      AI_MODELS: cmc/deepseek/deepseek-v4-pro,cmc/deepseek/deepseek-v4-flash,cmc/moonshotai/Kimi-K2.6
      NINE_ROUTER_BASE_URL: http://localhost:20129/v1
      NINE_ROUTER_API_KEY: test
      OBJECT_STORAGE_PROVIDER: local
      LOCAL_UPLOAD_DIR: .data/uploads
      RATE_LIMIT_PROVIDER: memory
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma migrate
        run: bunx prisma migrate deploy

      - name: Check
        run: bun run check

      - name: Storybook build
        run: bun run storybook:build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Storybook component tests
        run: bun run test:storybook

      - name: Chromatic visual tests
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        run: bun run chromatic

      - name: Build
        run: bun run build
