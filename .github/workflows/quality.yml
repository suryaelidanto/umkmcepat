name: Quality

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: umkmcepat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d umkmcepat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/umkmcepat?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OBJECT_STORAGE_PROVIDER: local
      LOCAL_UPLOAD_DIR: .data/uploads
      PROJECT_ARTIFACT_STORAGE_PROVIDER: local
      PROJECT_ARTIFACT_DIR: .data/project-artifacts
      PROJECT_BUILD_WORKSPACE_DIR: .data/project-build-workspaces
      PROJECT_RUNTIME_DIR: .data/project-runtimes
      PROJECT_RUNTIME_SUPERVISOR: noop
      PROJECT_THUMBNAIL_DIR: .data/project-thumbnails
      RATE_LIMIT_PROVIDER: memory
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        # setup-bun reads the pinned packageManager version from package.json.

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma migrate
        run: bunx prisma migrate deploy

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Storybook build
        run: bun run storybook:build

      - name: Storybook accessibility and component tests
        run: bun run test:storybook

      - name: Chromatic visual tests
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        run: bun run chromatic

      - name: Build
        run: bun run build

      - name: Verify full suite
        run: bun run verify
